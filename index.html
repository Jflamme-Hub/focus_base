<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <meta name="theme-color" content="#6750A4">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="app_icon.png">
    <title>Focus Base</title>
    <!-- Google Fonts: Roboto and Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Global Styles -->
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/components.css">
    <link rel="stylesheet" href="./src/styles/sidebar.css">
    <link rel="stylesheet" href="./src/styles/dashboard.css">
    <link rel="stylesheet" href="./src/styles/pages.css">
    <link rel="stylesheet" href="./src/styles/focus.css">
    <link rel="stylesheet" href="./src/styles/modal.css">
    <link rel="stylesheet" href="./src/styles/fresh_start.css">
    <link rel="stylesheet" href="./src/styles/calendar.css">
    <link rel="stylesheet" href="./src/styles/task_extras.css">
</head>

<body>
    <div id="app">
        <nav id="sidebar"></nav>
        <main id="main-content">
            <header id="top-bar">
                <h1>Today's Focus</h1>
            </header>
            <div id="view-container">
                <!-- Dynamic content will receive injection here -->
                <div class="loading-state">
                    <span class="material-symbols-rounded spinning">refresh</span>
                    <p>Loading your space...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script type="module" src="./src/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch((err) => console.log('SW Failed', err));
            });
        }
    </script>
</body>

</html>
